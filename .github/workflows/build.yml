name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - run: nimby install windy -g
      - run: nimby install pixie -g
      - run: nimby install vmath -g
      - run: nim check tests/tests.nim
      - run: nim r tests/tests.nim
      - name: Compile examples
        working-directory: examples
        run: |
          nim c basic_screen.nim
          nim c basic_triangle.nim
          nim c basic_quad.nim
          nim c basic_cube.nim
          nim c sprite_sheet.nim
          nim c viewer_obj.nim
